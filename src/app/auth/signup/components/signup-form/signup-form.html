<form class="signup-form" (ngSubmit)="onSubmit()">
  <div class="form-group">
    <label for="fullName">Full Name</label>
    <input
      id="fullName"
      type="text"
      placeholder="Your full name"
      [ngModel]="fullName()"
      (ngModelChange)="fullName.set($event)"
      name="fullName"
      required
      autocomplete="name"
    />
  </div>

  <div class="form-group">
    <label for="email">E-mail</label>
    <input
      id="email"
      type="email"
      placeholder="example@saferoads.com"
      [ngModel]="email()"
      (ngModelChange)="email.set($event)"
      name="email"
      required
      autocomplete="email"
    />
  </div>

  <div class="form-group">
    <label for="password">Password</label>
    <div class="password-wrapper">
      <input
        id="password"
        [type]="showPassword() ? 'text' : 'password'"
        placeholder="At least 6 characters"
        [ngModel]="password()"
        (ngModelChange)="password.set($event)"
        name="password"
        required
        minlength="6"
        autocomplete="new-password"
      />
      <button
        type="button"
        class="toggle-password"
        (click)="togglePasswordVisibility()"
        [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'"
      >
        <i class="fas" [class.fa-eye]="!showPassword()" [class.fa-eye-slash]="showPassword()"></i>
      </button>
    </div>
    @if (password() && password().length < 6) {
      <span class="hint error">Password must be at least 6 characters long</span>
    }
  </div>

  <div class="form-group">
    <label for="confirmPassword">Confirm Password</label>
    <input
      id="confirmPassword"
      [type]="showPassword() ? 'text' : 'password'"
      placeholder="Confirm your password"
      [ngModel]="confirmPassword()"
      (ngModelChange)="confirmPassword.set($event)"
      name="confirmPassword"
      required
      autocomplete="new-password"
    />
    @if (confirmPassword() && !passwordsMatch) {
      <span class="hint error">Passwords do not match</span>
    }
  </div>

  <button type="submit" class="btn-signup" [disabled]="!isFormValid">Sign Up</button>
</form>

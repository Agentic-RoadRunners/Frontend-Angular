<div class="cards-grid">
    <div class="stat-card incidents">
        <div class="card-icon"><i class="fas fa-exclamation-triangle"></i></div>
        <div class="card-content">
            <span class="card-value">{{ totalIncidents() }}</span>
            <span class="card-label">Total Incidents</span>
        </div>
    </div>
    <div class="stat-card users">
        <div class="card-icon"><i class="fas fa-users"></i></div>
        <div class="card-content">
            <span class="card-value">{{ totalUsers() }}</span>
            <span class="card-label">Total Users</span>
        </div>
    </div>
    <div class="stat-card resolved">
        <div class="card-icon"><i class="fas fa-check-circle"></i></div>
        <div class="card-content">
            <span class="card-value">{{ resolvedCount() }}</span>
            <span class="card-label">Resolved</span>
        </div>
    </div>
    <div class="stat-card municipalities">
        <div class="card-icon"><i class="fas fa-building"></i></div>
        <div class="card-content">
            <span class="card-value">{{ municipalityCount() }}</span>
            <span class="card-label">Municipalities</span>
        </div>
    </div>
</div>

<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-icon-wrapper incidents">
      <i class="fas fa-triangle-exclamation"></i>
    </div>
    <div class="stat-info">
      <span class="stat-value">{{ stats.totalIncidents }}</span>
      <span class="stat-label">Incidents Reported</span>
    </div>
  </div>

  <div class="stat-card">
    <div class="stat-icon-wrapper comments">
      <i class="fas fa-comments"></i>
    </div>
    <div class="stat-info">
      <span class="stat-value">{{ stats.totalComments }}</span>
      <span class="stat-label">Comments</span>
    </div>
  </div>

  <div class="stat-card">
    <div class="stat-icon-wrapper verifications">
      <i class="fas fa-circle-check"></i>
    </div>
    <div class="stat-info">
      <span class="stat-value">{{ stats.totalVerifications }}</span>
      <span class="stat-label">Verifications</span>
    </div>
  </div>

  <div class="stat-card">
    <div class="stat-icon-wrapper trust">
      <i class="fas fa-shield-halved"></i>
    </div>
    <div class="stat-info">
      <span class="stat-value">{{ stats.trustScore }}</span>
      <span class="stat-label">Trust Score</span>
    </div>
  </div>
</div>

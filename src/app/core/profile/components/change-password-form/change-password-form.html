<form class="password-form" [formGroup]="form" (ngSubmit)="onSubmit()">
  <h2 class="section-title">
    <i class="fas fa-lock"></i>
    Change Password
  </h2>

  <div class="form-group">
    <label for="currentPassword">Current Password</label>
    <div class="input-wrapper">
      <input
        id="currentPassword"
        [type]="showCurrent ? 'text' : 'password'"
        formControlName="currentPassword"
        placeholder="Enter current password" />
      <button type="button" class="toggle-eye" (click)="showCurrent = !showCurrent">
        <i class="fas" [class.fa-eye]="!showCurrent" [class.fa-eye-slash]="showCurrent"></i>
      </button>
    </div>
  </div>

  <div class="form-group">
    <label for="newPassword">New Password</label>
    <div class="input-wrapper">
      <input
        id="newPassword"
        [type]="showNew ? 'text' : 'password'"
        formControlName="newPassword"
        placeholder="Enter new password (min 6 chars)" />
      <button type="button" class="toggle-eye" (click)="showNew = !showNew">
        <i class="fas" [class.fa-eye]="!showNew" [class.fa-eye-slash]="showNew"></i>
      </button>
    </div>
    @if (form.get('newPassword')?.invalid && form.get('newPassword')?.touched) {
      <span class="error-text">Password must be at least 6 characters.</span>
    }
  </div>

  <div class="form-group">
    <label for="confirmPassword">Confirm New Password</label>
    <input
      id="confirmPassword"
      type="password"
      formControlName="confirmPassword"
      placeholder="Confirm new password" />
    @if (form.get('confirmPassword')?.touched && passwordMismatch) {
      <span class="error-text">Passwords do not match.</span>
    }
  </div>

  <button
    class="btn-change"
    type="submit"
    [disabled]="form.invalid || passwordMismatch || saving">
    @if (saving) {
      <i class="fas fa-spinner fa-spin"></i> Changing…
    } @else {
      <i class="fas fa-key"></i> Change Password
    }
  </button>
</form>

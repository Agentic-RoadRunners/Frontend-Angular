<div class="profile-page">

  <!-- ── Header Bar ─────────────────────────────────────── -->
  <header class="page-top-bar">
    <div class="bar-left">
      <i class="fas fa-user bar-icon"></i>
      <h1>My Profile</h1>
    </div>
    <button class="btn-refresh" (click)="loadData()" [disabled]="isLoading()">
      <i class="fas fa-rotate-right" [class.spinning]="isLoading()"></i>
      Refresh
    </button>
  </header>

  <!-- ── Toast Messages ─────────────────────────────────── -->
  @if (successMessage()) {
  <div class="toast toast-success">
    <i class="fas fa-circle-check"></i>
    {{ successMessage() }}
  </div>
  }
  @if (errorMessage()) {
  <div class="toast toast-error">
    <i class="fas fa-circle-xmark"></i>
    {{ errorMessage() }}
  </div>
  }

  <!-- ── Loading / Error / Content ──────────────────────── -->
  @if (isLoading()) {
  <div class="state-container">
    <div class="spinner"></div>
    <p>Loading profile…</p>
  </div>
  } @else if (hasError()) {
  <div class="state-container state-error">
    <i class="fas fa-circle-exclamation"></i>
    <p>Failed to load profile.</p>
    <button class="btn-retry" (click)="loadData()">
      <i class="fas fa-rotate-right"></i> Retry
    </button>
  </div>
  } @else {
  <div class="profile-content">

    <!-- Profile Header -->
    @if (profile(); as p) {
    <app-profile-header [profile]="p" />
    }

    <!-- Stats -->
    @if (stats(); as s) {
    <app-profile-stats [stats]="s" />
    }

    <!-- Watched Areas -->
    <app-watched-areas-list />

    <!-- Forms Grid -->
    <div class="forms-grid">
      @if (profile(); as p) {
      <app-profile-edit-form [profile]="p" [saving]="savingProfile()" (save)="onProfileSave($event)" />
      }

      <app-change-password-form [saving]="savingPassword()" (save)="onPasswordChange($event)" />
    </div>

  </div>
  }
</div>
